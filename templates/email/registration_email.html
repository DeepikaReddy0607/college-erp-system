<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verify Your Account</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Arial, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0">
        <tr>
            <td align="center">

                <table width="400" cellpadding="20" cellspacing="0" style="background:#ffffff; margin-top:40px; border-radius:8px;">

                    <tr>
                        <td align="center">
                            <h2 style="margin:0; color:#333;">Account Verification</h2>
                        </td>
                    </tr>

                    <tr>
                        <td align="center">
                            <p style="color:#555;">
                                Hello {{ user.username }},
                            </p>

                            <p style="color:#555;">
                                Thank you for registering in ERP System.
                            </p>

                            <p style="color:#555;">
                                Click the button below to verify your account:
                            </p>

                            <a href="{{ verification_link }}" 
                               style="display:inline-block; padding:12px 25px; background:#007BFF; color:#fff; text-decoration:none; border-radius:5px;">
                                Verify Account
                            </a>

                            <p style="margin-top:20px; color:#777;">
                                Or copy and paste this link:
                            </p>

                            <p style="word-break:break-all; color:#555;">
                                {{ verification_link }}
                            </p>
                        </td>
                    </tr>

                    <tr>
                        <td align="center">
                            <p style="font-size:12px; color:#aaa;">
                                If you didn’t register, ignore this email.
                            </p>
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
