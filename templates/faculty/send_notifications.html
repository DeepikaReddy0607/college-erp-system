{% extends "dashboard/base.html" %}
{% load static %}
{% block title %}Send Notification{% endblock %}
{% block extra_css%}
<link rel = "stylesheet" href="{% static 'css/notifications.css' %}">
{% endblock %}
{% block content %}
<style>
#send-notifications-active{
    background: #2f3e8f;
    color: #ffffff;
}
</style>
<div class="faculty-page">

    <h2>Send Notification</h2>

    <form method="post">
        {% csrf_token %}

        <label>Title</label>
        <input type="text" name="title" required>

        <label>Message</label>
        <textarea name="message" rows="4" required></textarea>

        <label>Notification Type</label>
        <select name="notification_type">
            <option value="INFO">Info</option>
            <option value="WARNING">Warning</option>
            <option value="CRITICAL">Critical</option>
        </select>

        <label>Select Subject (Course Offering)</label>
        <select name="course_offering_id" required>
            {% for co in faculty_course_offerings %}
                <option value="{{ co.id }}">
                    {{ co.course.course_title }} |
                    Semester {{ co.semester.number }} |
                    Section {{ co.section }}
                </option>
            {% endfor %}
        </select>

        <label>Send To</label>
        <select name="recipient_scope" required>
            <option value="students">Students of this Subject</option>

            {% if is_hod %}
                <option value="department">Entire Department</option>
            {% endif %}
        </select>

        <button type="submit">Send Notification</button>
    </form>

</div>
{% endblock %}
