{% extends "exam/base.html" %}

{% block title %}Upload Semester Results{% endblock %}

{% block content %}
<style>
#dashboard-active{
    background: #2f3e8f;
    color: #ffffff;
}
</style>
<h2>Upload Semester Results</h2>

<p>
Semester: <strong>{{ semester.name }}</strong>
</p>

<form method="POST">

{% csrf_token %}

<table class="dashboard-table">

<tr>
<th>Student</th>
<th>SGPA</th>
<th>CGPA</th>
</tr>

{% for student in students %}

<tr>

<td>{{ student.username }}</td>

<td>
<input
type="number"
step="0.01"
name="sgpa_{{ student.id }}"
placeholder="SGPA"
>
</td>

<td>
<input
type="number"
step="0.01"
name="cgpa_{{ student.id }}"
placeholder="CGPA"
>
</td>

</tr>

{% endfor %}

</table>

<br>

<button type="submit" class="action-btn">
Save Semester Results
</button>

</form>

{% endblock %}
